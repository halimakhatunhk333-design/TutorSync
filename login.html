<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorSync - Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("https://burst.shopifycdn.com/photos/person-holds-a-book-over-a-stack-and-turns-the-page.jpg?width=1000&format=pjpg&exif=0&iptc=0");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.container{
    width:500px;
    padding:30px;
    border-radius:20px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo-section{
    text-align:center;
    margin-bottom:15px;
}

.logo-section i{
    font-size:50px;
    color:#10b981;
}

.logo-section h1{
    color:#10b981;
    font-size:34px;
    letter-spacing:2px;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:24px;
    letter-spacing:1px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    color:white;
    font-weight:600;
}

input{
    width:100%;
    padding:12px 15px;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:8px;
    color:white;
    font-size:14px;
}

input::placeholder{
    color:#e5e7eb;
}

input:focus{
    outline:none;
    border-color:#38bdf8;
    box-shadow:0 0 15px rgba(56,189,248,0.5);
}

.btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    background:#10b981;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#059669;
    box-shadow:0 0 20px rgba(56,189,248,0.7);
}

.register-link{
    text-align:center;
    margin-top:25px;
    color:white;
}

.register-link a{
    color:#38bdf8;
    text-decoration:underline;
    font-weight:600;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo-section">
        <i class="fas fa-user-graduate"></i>
        <h1>TutorSync</h1>
    </div>

    <h2>Student Login Portal</h2>

    <form id="loginForm">

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
        </div>

        <button class="btn" type="submit">
            Login
        </button>

        <div class="register-link">
            Don't have an account?
            <a href="registration.html">Register</a>
        </div>

    </form>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(event){

    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    let savedEmail = localStorage.getItem("email");
    let savedPassword = localStorage.getItem("password");

    if(email === "" || password === ""){
        alert("Please fill in all fields.");
        return;
    }

    if(email === savedEmail && password === savedPassword){
        alert("Login Successful!");
    }
    else{
        alert("Invalid Email or Password.");
    }

});

</script>

</body>
</html>
